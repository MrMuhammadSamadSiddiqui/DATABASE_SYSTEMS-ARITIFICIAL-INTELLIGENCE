<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration — VEI NEXUS</title>
    <link rel="stylesheet" href="main.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary-glow: #3b82f6;
            --secondary-glow: #1d4ed8;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Theme Elements --- */
        .bg_pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -2;
        }
        .bg_grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.3;
        }

        /* --- Navigation --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }
        nav > div { display: flex; align-items: center; gap: 15px; }
        .logo img { width: 40px; height: auto; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        nav p:first-of-type { font-weight: 700; letter-spacing: 2px; color: var(--primary-glow); font-size: 1.2rem; }
        nav p:last-of-type { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px; }
        nav a { 
            text-decoration: none; color: white; border: 1px solid var(--primary-glow);
            padding: 8px 20px; border-radius: 5px; font-size: 0.8rem; transition: 0.3s;
        }
        nav a:hover { background: var(--primary-glow); box-shadow: 0 0 20px var(--primary-glow); }
        .line { height: 1px; background: linear-gradient(90deg, transparent, var(--primary-glow), transparent); width: 100%; }

        /* --- Form Styling --- */
        main.container {
            max-width: 900px; margin: 50px auto; padding: 0 20px;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 30px; border-radius: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 {
            font-size: 1.1rem; color: var(--primary-glow); text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 25px; border-left: 4px solid var(--primary-glow);
            padding-left: 15px;
        }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .field { margin-bottom: 15px; }
        .full-width { grid-column: 1 / -1; }

        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color); border-radius: 8px;
            color: white; font-size: 0.9rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-glow); outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }

        /* --- Buttons --- */
        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn {
            flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
            color: var(--text-muted); border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .toggle-btn.active { background: var(--primary-glow); color: white; border-color: var(--primary-glow); }

        .add-btn {
            background: transparent; color: var(--primary-glow); border: 1px dashed var(--primary-glow);
            padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .submit-btn {
            width: 100%; padding: 18px; background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 1rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 0 30px var(--primary-glow); }

        .sibling-entry { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .remove-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="bg_pattern"></div>
    <div class="bg_grid"></div>
    <div id="cursor"></div>
    <div id="ring"></div>

    <nav>
        <div>
            <div class="logo">
                <img src="/assets/images/logo_white.png" alt="Logo">
            </div>
            <div>
                <p>VEI NEXUS</p>
                <p>VIRTUAL EDUCATION INSTITUTE</p>
            </div>
        </div>
        <div>
            <a href="login.html">LOGIN</a>
        </div>
    </nav>
    <div class="line"></div>

    <main class="container">
        <form id="reg-form">
            <div class="card">
                <h2>Personal Information</h2>
                <div class="grid-2">
                    <div class="field">
                        <label>Student Full Name</label>
                        <input type="text" name="full_name" placeholder="Ahmed Ali" required>
                    </div>
                    <div class="field">
                        <label>Father's Name</label>
                        <input type="text" name="father_name" placeholder="Muhammad Ali" required>
                    </div>
                    <div class="field">
                        <label>Date of Birth</label>
                        <input type="date" name="date_of_birth" required>
                    </div>
                    <div class="field">
                        <label>Guardian Contact</label>
                        <input type="tel" name="guardian_contact" placeholder="+92 300 0000000" required>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Academic Details</h2>
                <div class="grid-2">
                    <div class="field">
                        <label>Board</label>
                        <select name="education_board" required>
                            <option value="">Select Board</option>
                            <option>O Level</option>
                            <option>A Level</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Class / Year</label>
                        <select name="class_year" id="class_year_select" onchange="toggleCustomClass(this.value)" required>
                            <option value="">Select Class</option>
                            <option>O Level - Year 1</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="field full-width" id="custom-class-container" style="display:none;">
                        <label>Specify Class</label>
                        <input type="text" id="custom_class_input" placeholder="e.g. Grade 9">
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Siblings at VEI</h2>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn active" id="sib-no" onclick="toggleSiblings(false)">No</button>
                    <button type="button" class="toggle-btn" id="sib-yes" onclick="toggleSiblings(true)">Yes</button>
                </div>
                <input type="hidden" name="has_sibling" id="has_sibling" value="no">
                <div id="siblings-container" style="display:none;">
                    <div id="sibling-list"></div>
                    <button type="button" class="add-btn" onclick="addSibling()">+ Add Another Sibling</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Register Now</button>
        </form>
    </main>

    <script>
        let siblingCount = 0;

        function toggleCustomClass(value) {
            const container = document.getElementById('custom-class-container');
            container.style.display = (value === 'other') ? 'block' : 'none';
        }

        function toggleSiblings(show) {
            document.getElementById('siblings-container').style.display = show ? 'block' : 'none';
            document.getElementById('has_sibling').value = show ? 'yes' : 'no';
            document.getElementById('sib-yes').classList.toggle('active', show);
            document.getElementById('sib-no').classList.toggle('active', !show);
            if (show && siblingCount === 0) addSibling();
        }

        function addSibling() {
            siblingCount++;
            const list = document.getElementById('sibling-list');
            const entry = document.createElement('div');
            entry.className = 'sibling-entry';
            entry.id = `sibling-${siblingCount}`;
            entry.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="font-size:0.8rem; color:var(--primary-glow)">Sibling #${siblingCount}</span>
                    <button type="button" class="remove-btn" onclick="removeSibling(${siblingCount})">Remove</button>
                </div>
                <div class="grid-2">
                    <input type="text" placeholder="Sibling Name">
                    <input type="text" placeholder="Roll Number">
                </div>
            `;
            list.appendChild(entry);
        }

        function removeSibling(id) {
            document.getElementById(`sibling-${id}`).remove();
        }

        // --- Custom Cursor Logic (Optional) ---
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('ring');
        document.addEventListener('mousemove', (e) => {
            if(cursor) cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            if(ring) ring.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });
    </script>
</body>
</html>
